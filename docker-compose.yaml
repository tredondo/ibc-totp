services:
  tws:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: ibkr-tws-prod
    ports:
      - "5901:5900"  # VNC
    secrets:
      - tws
    restart: unless-stopped
    volumes:
      - tws-data:/home/tws/jts
    environment:
      - DISPLAY=:0
      - TZ=Asia/Jerusalem
      # Xvfb / VNC screen size, WIDTHxHEIGHT.  Override per-run, e.g.:
      #   VNC_RESOLUTION=1280x800 docker compose up -d
      - VNC_RESOLUTION=${VNC_RESOLUTION:-1920x1080}

secrets:
  tws:
    file: ./docker/tws.secrets

volumes:
  tws-data:
